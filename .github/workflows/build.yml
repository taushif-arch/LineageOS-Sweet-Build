name: Build LineageOS 21 for Sweet

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: 🧹 Maximize Build Space
        uses: easimon/maximize-build-space@master
        with:
          root-reserve-mb: 1024
          swap-size-mb: 8192 # Swap komiye 8GB korlam jate Hard disk faka thake
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'
          remove-docker-images: 'true'

      - name: 📦 Install Build Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git git-lfs gnupg gperf imagemagick lib32ncurses5-dev lib32readline-dev lib32z1-dev liblz4-tool libncurses5 libncurses5-dev libsdl1.2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev python3
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo

      - name: 🚀 Initialize Repo & Sync Source
        run: |
          PATH=~/bin:$PATH
          mkdir -p ~/workspace
          cd ~/workspace
          git config --global user.name "Taushif"
          git config --global user.email "taushif@example.com"
          
          # Shallow Sync (Depth 1) bebohar korlam storage bachanor jonno
          repo init -u https://github.com/LineageOS/android.git -b lineage-21.0 --git-lfs --depth=1
          
          mkdir -p .repo/local_manifests
          cat <<EOF > .repo/local_manifests/sweet.xml
          <?xml version="1.0" encoding="UTF-8"?>
          <manifest>
              <project name="LineageOS/android_device_xiaomi_sweet" path="device/xiaomi/sweet" remote="github" />
              <project name="LineageOS/android_device_xiaomi_sm6150-common" path="device/xiaomi/sm6150-common" remote="github" />
              <project name="LineageOS/android_kernel_xiaomi_sm6150" path="kernel/xiaomi/sm6150" remote="github" />
              <project name="TheMuppets/proprietary_vendor_xiaomi" path="vendor/xiaomi" remote="github" depth="1" />
          </manifest>
          EOF
          
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags
          
          # Extra kachra muche hard disk faka kora
          rm -rf .repo/project-objects

      - name: 🛠️ Build The ROM
        run: |
          PATH=~/bin:$PATH
          cd ~/workspace
          export _JAVA_OPTIONS="-Xmx4g"
          source build/envsetup.sh
          breakfast sweet
          m bacon -j$(nproc --all)

      - name: 📤 Upload ROM
        uses: actions/upload-artifact@v4
        with:
          name: LineageOS-Sweet-ROM
          path: ~/workspace/out/target/product/sweet/lineage-*.zip
